services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: catsense-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: catsense
      POSTGRES_PASSWORD: catsense
      POSTGRES_DB: catsense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catsense -d catsense"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
